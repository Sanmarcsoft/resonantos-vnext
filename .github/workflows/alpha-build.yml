name: alpha-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/alpha-build.yml"
      - "addons/**"
      - "docs/**"
      - "package-lock.json"
      - "package.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig*.json"

jobs:
  build-alpha:
    name: Build alpha (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact-name: resonantos-alpha-macos
            artifact-path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app
          - platform: windows-latest
            artifact-name: resonantos-alpha-windows
            artifact-path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - platform: ubuntu-22.04
            artifact-name: resonantos-alpha-linux
            artifact-path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri bundle
        run: npm run tauri:build

      - name: Upload alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14
